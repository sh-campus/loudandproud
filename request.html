<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Loud & Proud Karaoke — Request a Song</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Anton&family=Caveat:wght@700&family=DM+Sans:wght@400;500;700&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background:
      radial-gradient(circle at 15% 10%, rgba(255,45,150,0.25), transparent 40%),
      radial-gradient(circle at 85% 85%, rgba(0,220,255,0.2), transparent 45%),
      #0c0a18;
    color: #fff;
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 2rem 1.25rem 3rem;
  }

  .star {
    position: fixed;
    opacity: 0.5;
    pointer-events: none;
  }

  .title-block { text-align: center; margin-bottom: 0.5rem; position: relative; z-index: 1; }

  .title-loud {
    font-family: 'Anton', sans-serif;
    font-size: 2.6rem;
    letter-spacing: 0.02em;
    color: #5fd9d9;
    text-shadow: 0 0 18px rgba(95,217,217,0.6);
    line-height: 1;
  }

  .title-karaoke {
    font-family: 'Caveat', cursive;
    font-size: 2.2rem;
    color: #f0b94d;
    transform: rotate(-3deg);
    margin-top: -4px;
    text-shadow: 0 0 14px rgba(240,185,77,0.4);
  }

  .subtitle {
    text-align: center;
    font-size: 0.78rem;
    color: #b9a9d6;
    margin-top: 0.5rem;
    margin-bottom: 1.75rem;
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }

  .card {
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 18px;
    padding: 1.75rem 1.5rem;
    width: 100%;
    max-width: 420px;
    position: relative;
    z-index: 1;
  }

  label {
    display: block;
    font-size: 0.75rem;
    text-transform: uppercase;
    letter-spacing: 0.07em;
    color: #8ee8e8;
    margin-bottom: 0.4rem;
    font-weight: 700;
  }

  input {
    width: 100%;
    background: rgba(255,255,255,0.07);
    border: 1px solid rgba(255,255,255,0.18);
    border-radius: 10px;
    color: #fff;
    font-family: 'DM Sans', sans-serif;
    font-size: 1rem;
    padding: 0.75rem 1rem;
    outline: none;
    transition: border-color 0.2s;
    margin-bottom: 1.25rem;
  }

  input:focus { border-color: #f0498f; }
  input::placeholder { color: rgba(255,255,255,0.3); }

  .btn {
    width: 100%;
    background: linear-gradient(135deg, #f0498f, #5fd9d9);
    border: none;
    border-radius: 10px;
    color: #0c0a18;
    font-family: 'Anton', sans-serif;
    font-size: 1.15rem;
    letter-spacing: 0.02em;
    padding: 0.85rem;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.1s;
  }

  .btn:active { transform: scale(0.98); }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }

  .success {
    display: none;
    text-align: center;
    padding: 1.5rem 0;
    position: relative;
    z-index: 1;
  }

  .success .emoji { font-size: 2.8rem; margin-bottom: 0.75rem; }
  .success h2 { font-family: 'Anton', sans-serif; font-size: 1.5rem; color: #f0b94d; margin-bottom: 0.5rem; }
  .success p { color: #b9a9d6; font-size: 0.92rem; }

  .another-btn {
    margin-top: 1.5rem;
    background: transparent;
    border: 1px solid rgba(255,255,255,0.25);
    border-radius: 10px;
    color: #b9a9d6;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.88rem;
    padding: 0.6rem 1.5rem;
    cursor: pointer;
  }

  .error-text {
    display: none;
    color: #f0498f;
    font-size: 0.78rem;
    margin: -0.9rem 0 1rem;
  }
</style>
</head>
<body>

<svg class="star" style="top:8%; left:6%; width:34px;" viewBox="0 0 24 24" fill="none" stroke="#5fd9d9" stroke-width="1.2"><path d="M12 2l2.5 6.5L21 11l-6.5 2.5L12 20l-2.5-6.5L3 11l6.5-2.5z"/></svg>
<svg class="star" style="top:75%; right:8%; width:26px;" viewBox="0 0 24 24" fill="none" stroke="#f0498f" stroke-width="1.2"><path d="M12 2l2.5 6.5L21 11l-6.5 2.5L12 20l-2.5-6.5L3 11l6.5-2.5z"/></svg>
<svg class="star" style="top:88%; left:10%; width:20px;" viewBox="0 0 24 24" fill="none" stroke="#f0b94d" stroke-width="1.2"><path d="M12 2l2.5 6.5L21 11l-6.5 2.5L12 20l-2.5-6.5L3 11l6.5-2.5z"/></svg>

<div class="title-block">
  <div class="title-loud">LOUD &amp;<br>PROUD</div>
  <div class="title-karaoke">Karaoke</div>
</div>
<p class="subtitle">After Work Drinks · Request your song</p>

<div class="card" id="form-card">
  <div>
    <label for="name">Your name</label>
    <input type="text" id="name" placeholder="e.g. Alex" autocomplete="off" />
  </div>
  <div>
    <label for="song">Song title &amp; artist</label>
    <input type="text" id="song" placeholder="e.g. I Will Survive — Gloria Gaynor" autocomplete="off" />
  </div>
  <p class="error-text" id="error-text">Please add your name and a song.</p>
  <button class="btn" id="submit-btn" onclick="submitRequest()">ADD ME TO THE QUEUE 🎤</button>
</div>

<div class="success" id="success-card">
  <div class="emoji">🌈</div>
  <h2>YOU'RE IN THE QUEUE!</h2>
  <p>Get ready to sing your heart out.<br>Watch the screen for your name.</p>
  <button class="another-btn" onclick="resetForm()">Add another song</button>
</div>

<script>
  async function submitRequest() {
    const name = document.getElementById('name').value.trim();
    const song = document.getElementById('song').value.trim();
    const errorText = document.getElementById('error-text');

    if (!name || !song) {
      errorText.style.display = 'block';
      return;
    }
    errorText.style.display = 'none';

    const btn = document.getElementById('submit-btn');
    btn.disabled = true;
    btn.textContent = 'ADDING...';

    try {
      const listResult = await window.storage.get('karaoke-queue', true).catch(() => null);
      const queue = listResult ? JSON.parse(listResult.value) : [];

      queue.push({
        id: Date.now(),
        name,
        song,
        timestamp: new Date().toLocaleTimeString('en-AU', { hour: '2-digit', minute: '2-digit' }),
        status: 'queued'
      });

      await window.storage.set('karaoke-queue', JSON.stringify(queue), true);

      document.getElementById('form-card').style.display = 'none';
      document.getElementById('success-card').style.display = 'block';
    } catch (e) {
      errorText.textContent = 'Something went wrong — please try again.';
      errorText.style.display = 'block';
    }

    btn.disabled = false;
    btn.textContent = 'ADD ME TO THE QUEUE 🎤';
  }

  function resetForm() {
    document.getElementById('name').value = '';
    document.getElementById('song').value = '';
    document.getElementById('form-card').style.display = 'block';
    document.getElementById('success-card').style.display = 'none';
  }
</script>
</body>
</html>
