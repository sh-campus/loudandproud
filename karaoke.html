<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Loud & Proud Karaoke — Song Queue</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Anton&family=Caveat:wght@700&family=DM+Sans:wght@400;500;700&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    background:
      radial-gradient(circle at 12% 12%, rgba(255,45,150,0.22), transparent 40%),
      radial-gradient(circle at 88% 85%, rgba(0,220,255,0.18), transparent 45%),
      #0c0a18;
    color: #fff;
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  .star {
    position: fixed;
    opacity: 0.4;
    pointer-events: none;
  }

  .wrap {
    max-width: 1100px;
    margin: 0 auto;
    padding: 3vh 4vw 4vh;
    position: relative;
    z-index: 1;
  }

  .header { text-align: center; margin-bottom: 3vh; }

  .title-loud {
    font-family: 'Anton', sans-serif;
    font-size: clamp(2.2rem, 6vw, 4rem);
    letter-spacing: 0.02em;
    color: #5fd9d9;
    text-shadow: 0 0 25px rgba(95,217,217,0.55);
    line-height: 1;
  }

  .title-karaoke {
    font-family: 'Caveat', cursive;
    font-size: clamp(1.8rem, 4.5vw, 3rem);
    color: #f0b94d;
    transform: rotate(-2deg);
    margin-top: -0.3rem;
    text-shadow: 0 0 18px rgba(240,185,77,0.4);
  }

  .subtitle {
    font-size: 0.9rem;
    color: #b9a9d6;
    letter-spacing: 0.07em;
    text-transform: uppercase;
    margin-top: 0.75rem;
  }

  .layout {
    display: grid;
    grid-template-columns: 380px 1fr;
    gap: 2rem;
  }

  @media (max-width: 800px) {
    .layout { grid-template-columns: 1fr; }
  }

  /* Add song card */
  .add-card {
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 18px;
    padding: 1.75rem 1.5rem;
    align-self: start;
  }

  .add-card h2 {
    font-family: 'Anton', sans-serif;
    font-size: 1.3rem;
    color: #f0498f;
    margin-bottom: 1.25rem;
    letter-spacing: 0.02em;
  }

  label {
    display: block;
    font-size: 0.72rem;
    text-transform: uppercase;
    letter-spacing: 0.07em;
    color: #8ee8e8;
    margin-bottom: 0.4rem;
    font-weight: 700;
  }

  input {
    width: 100%;
    background: rgba(255,255,255,0.07);
    border: 1px solid rgba(255,255,255,0.18);
    border-radius: 10px;
    color: #fff;
    font-family: 'DM Sans', sans-serif;
    font-size: 1rem;
    padding: 0.7rem 0.9rem;
    outline: none;
    transition: border-color 0.2s;
    margin-bottom: 1.1rem;
  }

  input:focus { border-color: #f0498f; }
  input::placeholder { color: rgba(255,255,255,0.3); }

  .btn {
    width: 100%;
    background: linear-gradient(135deg, #f0498f, #5fd9d9);
    border: none;
    border-radius: 10px;
    color: #0c0a18;
    font-family: 'Anton', sans-serif;
    font-size: 1.05rem;
    letter-spacing: 0.02em;
    padding: 0.8rem;
    cursor: pointer;
    transition: transform 0.1s;
  }

  .btn:active { transform: scale(0.98); }

  .error-text {
    display: none;
    color: #f0498f;
    font-size: 0.76rem;
    margin: -0.7rem 0 1rem;
  }

  .toast {
    display: none;
    background: rgba(95,217,217,0.12);
    border: 1px solid rgba(95,217,217,0.4);
    border-radius: 10px;
    padding: 0.6rem 0.9rem;
    font-size: 0.82rem;
    color: #8ee8e8;
    margin-top: 1rem;
    text-align: center;
  }

  /* Queue display */
  .queue-side { display: flex; flex-direction: column; gap: 1.25rem; }

  .now-singing {
    background: rgba(240,73,143,0.1);
    border: 2px solid rgba(240,73,143,0.45);
    border-radius: 18px;
    padding: 1.5rem 1.75rem;
    display: flex;
    align-items: center;
    gap: 1.25rem;
  }

  .ns-label {
    font-family: 'Anton', sans-serif;
    font-size: 0.75rem;
    color: #f0498f;
    letter-spacing: 0.08em;
    background: rgba(240,73,143,0.18);
    border-radius: 6px;
    padding: 4px 9px;
    white-space: nowrap;
    flex-shrink: 0;
  }

  .ns-info { flex: 1; min-width: 0; }
  .ns-song { font-size: 1.15rem; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .ns-name { font-size: 0.85rem; color: #8ee8e8; margin-top: 2px; }
  .ns-empty { font-size: 0.95rem; color: rgba(255,255,255,0.35); }

  .ns-done-btn {
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.2);
    border-radius: 8px;
    color: #fff;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.8rem;
    padding: 0.5rem 1rem;
    cursor: pointer;
    flex-shrink: 0;
    transition: background 0.15s;
  }

  .ns-done-btn:hover { background: rgba(255,255,255,0.15); }

  .queue-list-card {
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 18px;
    padding: 1.5rem 1.5rem 1rem;
  }

  .queue-list-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 1rem;
  }

  .queue-list-title {
    font-family: 'Anton', sans-serif;
    font-size: 1.05rem;
    color: #f0b94d;
    letter-spacing: 0.04em;
  }

  .queue-count { font-size: 0.78rem; color: #b9a9d6; }

  .queue-items {
    display: flex;
    flex-direction: column;
    gap: 0.6rem;
    max-height: 420px;
    overflow-y: auto;
  }

  .queue-items::-webkit-scrollbar { width: 4px; }
  .queue-items::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.12); border-radius: 2px; }

  .queue-item {
    display: flex;
    align-items: center;
    gap: 0.9rem;
    background: rgba(255,255,255,0.04);
    border-radius: 12px;
    padding: 0.7rem 1rem;
  }

  .q-num {
    font-family: 'Anton', sans-serif;
    font-size: 1.05rem;
    color: rgba(255,255,255,0.22);
    width: 1.6rem;
    text-align: center;
    flex-shrink: 0;
  }

  .q-text { flex: 1; min-width: 0; }
  .q-song { font-size: 0.92rem; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .q-name { font-size: 0.76rem; color: #b9a9d6; margin-top: 1px; }

  .q-actions { display: flex; gap: 5px; flex-shrink: 0; }

  .mini-btn {
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 6px;
    color: rgba(255,255,255,0.55);
    font-size: 0.72rem;
    font-family: 'DM Sans', sans-serif;
    padding: 4px 9px;
    cursor: pointer;
    white-space: nowrap;
    transition: all 0.15s;
  }

  .mini-btn:hover { background: rgba(255,255,255,0.13); color: #fff; }
  .mini-btn.sing-now { border-color: rgba(95,217,217,0.4); color: #5fd9d9; }
  .mini-btn.sing-now:hover { background: rgba(95,217,217,0.1); }
  .mini-btn.remove:hover { background: rgba(255,80,80,0.12); color: #ff5050; border-color: rgba(255,80,80,0.3); }

  .empty-queue {
    text-align: center;
    padding: 2.5rem 1rem;
    color: rgba(255,255,255,0.25);
  }

  .empty-queue .big { font-size: 2.2rem; margin-bottom: 0.5rem; }
  .empty-queue p { font-size: 0.85rem; }
</style>
</head>
<body>

<svg class="star" style="top:5%; left:3%; width:30px;" viewBox="0 0 24 24" fill="none" stroke="#5fd9d9" stroke-width="1.2"><path d="M12 2l2.5 6.5L21 11l-6.5 2.5L12 20l-2.5-6.5L3 11l6.5-2.5z"/></svg>
<svg class="star" style="top:8%; right:4%; width:22px;" viewBox="0 0 24 24" fill="none" stroke="#f0498f" stroke-width="1.2"><path d="M12 2l2.5 6.5L21 11l-6.5 2.5L12 20l-2.5-6.5L3 11l6.5-2.5z"/></svg>
<svg class="star" style="bottom:5%; right:6%; width:24px;" viewBox="0 0 24 24" fill="none" stroke="#f0b94d" stroke-width="1.2"><path d="M12 2l2.5 6.5L21 11l-6.5 2.5L12 20l-2.5-6.5L3 11l6.5-2.5z"/></svg>

<div class="wrap">
  <div class="header">
    <div class="title-loud">LOUD &amp; PROUD</div>
    <div class="title-karaoke">Karaoke</div>
    <div class="subtitle">After Work Drinks · Song Queue</div>
  </div>

  <div class="layout">

    <div class="add-card">
      <h2>🎤 Add Your Song</h2>
      <div>
        <label for="name">Your name</label>
        <input type="text" id="name" placeholder="e.g. Alex" autocomplete="off" />
      </div>
      <div>
        <label for="song">Song title &amp; artist</label>
        <input type="text" id="song" placeholder="e.g. I Will Survive — Gloria Gaynor" autocomplete="off" />
      </div>
      <p class="error-text" id="error-text">Please add your name and a song.</p>
      <button class="btn" onclick="addToQueue()">ADD TO THE QUEUE</button>
      <div class="toast" id="toast">You're in! Watch the list for your turn 🌈</div>
    </div>

    <div class="queue-side">
      <div class="now-singing">
        <span class="ns-label">NOW SINGING</span>
        <div class="ns-info" id="ns-info">
          <div class="ns-empty">Waiting for the first performer…</div>
        </div>
        <button class="ns-done-btn" onclick="markDone()" id="done-btn" style="display:none;">✓ Done</button>
      </div>

      <div class="queue-list-card">
        <div class="queue-list-header">
          <span class="queue-list-title">UP NEXT</span>
          <span class="queue-count" id="queue-count">0 waiting</span>
        </div>
        <div class="queue-items" id="queue-items">
          <div class="empty-queue" id="empty-state">
            <div class="big">🎶</div>
            <p>No one in the queue yet — be the first!</p>
          </div>
        </div>
      </div>
    </div>

  </div>
</div>

<script>
  const STORAGE_KEY = 'loudProudQueue';

  function getQueue() {
    try {
      return JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
    } catch (e) { return []; }
  }

  function saveQueue(q) {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(q));
  }

  function esc(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function addToQueue() {
    const nameInput = document.getElementById('name');
    const songInput = document.getElementById('song');
    const name = nameInput.value.trim();
    const song = songInput.value.trim();
    const errorText = document.getElementById('error-text');
    const toast = document.getElementById('toast');

    if (!name || !song) {
      errorText.style.display = 'block';
      toast.style.display = 'none';
      return;
    }
    errorText.style.display = 'none';

    const q = getQueue();
    q.push({
      id: Date.now(),
      name,
      song,
      timestamp: new Date().toLocaleTimeString('en-AU', { hour: '2-digit', minute: '2-digit' }),
      status: 'queued'
    });
    saveQueue(q);

    nameInput.value = '';
    songInput.value = '';
    toast.style.display = 'block';
    setTimeout(() => { toast.style.display = 'none'; }, 3000);

    render();
  }

  function singNow(id) {
    const q = getQueue();
    // demote any currently playing item back to queued (shouldn't normally happen)
    q.forEach(i => { if (i.status === 'playing') i.status = 'queued'; });
    const item = q.find(i => i.id === id);
    if (item) item.status = 'playing';
    saveQueue(q);
    render();
  }

  function markDone() {
    const q = getQueue();
    const playing = q.find(i => i.status === 'playing');
    if (playing) playing.status = 'done';
    saveQueue(q);
    render();
  }

  function removeItem(id) {
    saveQueue(getQueue().filter(i => i.id !== id));
    render();
  }

  function render() {
    const all = getQueue();
    const playing = all.find(i => i.status === 'playing');
    const queued = all.filter(i => i.status === 'queued');

    const nsInfo = document.getElementById('ns-info');
    const doneBtn = document.getElementById('done-btn');

    if (playing) {
      nsInfo.innerHTML = `
        <div class="ns-song">${esc(playing.song)}</div>
        <div class="ns-name">🎤 ${esc(playing.name)}</div>`;
      doneBtn.style.display = 'inline-block';
    } else {
      nsInfo.innerHTML = `<div class="ns-empty">Waiting for the first performer…</div>`;
      doneBtn.style.display = 'none';
    }

    document.getElementById('queue-count').textContent = queued.length === 1 ? '1 waiting' : `${queued.length} waiting`;

    const itemsEl = document.getElementById('queue-items');
    const emptyEl = document.getElementById('empty-state');
    itemsEl.querySelectorAll('.queue-item').forEach(e => e.remove());

    if (queued.length === 0) {
      emptyEl.style.display = 'block';
      return;
    }
    emptyEl.style.display = 'none';

    queued.forEach((item, i) => {
      const div = document.createElement('div');
      div.className = 'queue-item';
      div.innerHTML = `
        <div class="q-num">${i + 1}</div>
        <div class="q-text">
          <div class="q-song">${esc(item.song)}</div>
          <div class="q-name">${esc(item.name)} · ${item.timestamp}</div>
        </div>
        <div class="q-actions">
          <button class="mini-btn sing-now" onclick="singNow(${item.id})">Sing now</button>
          <button class="mini-btn remove" onclick="removeItem(${item.id})">✕</button>
        </div>`;
      itemsEl.appendChild(div);
    });
  }

  document.getElementById('song').addEventListener('keydown', e => {
    if (e.key === 'Enter') addToQueue();
  });

  render();
</script>
</body>
</html>
